name: Build OpenWrt packages

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ipk:
    name: Build IPK (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64-24.10.6
          - x86_64-23.05.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packages with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          PACKAGES: cf-ip-speed-client luci-app-cf-ip-speed-client
          FEED_DIR: ${{ github.workspace }}/openwrt-packages
          NO_SHFMT_CHECK: 1

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cf-ip-speed-client-${{ matrix.arch }}
          path: |
            bin/packages/**/*.ipk
            logs/**/*.txt
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-ipk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --title "$TAG_NAME" --notes "Cloudflare IP 优选助手 OpenWrt IPK 构建产物。"
          fi
          mapfile -t ipks < <(find artifacts -type f -name "*.ipk" | sort)
          if [ "${#ipks[@]}" -eq 0 ]; then
            find artifacts -type f -maxdepth 8 -print
            echo "No IPK files found"
            exit 1
          fi
          gh release upload "$TAG_NAME" --repo "$GITHUB_REPOSITORY" "${ipks[@]}" --clobber
